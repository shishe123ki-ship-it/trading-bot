version: "3.9"

services:
  trading-bot:
    build: .
    restart: unless-stopped
    env_file: config/.env
    volumes:
      - ./config:/app/config:ro
      - bot-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
