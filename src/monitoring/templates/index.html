<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Bot Dashboard</title>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #0d1117; color: #e6edf3; margin: 0; padding: 2rem; }
    h1 { color: #58a6ff; margin-bottom: 0.25rem; }
    h2 { color: #8b949e; font-size: 1rem; border-bottom: 1px solid #30363d; padding-bottom: 0.5rem; margin-top: 2rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; margin: 0.5rem 0; min-height: 4rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
    .metric { text-align: center; }
    .metric .value { font-size: 2rem; font-weight: bold; color: #58a6ff; }
    .metric .label { font-size: 0.8rem; color: #8b949e; }
    .pos { color: #3fb950; }
    .neg { color: #f85149; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { color: #8b949e; padding: 0.5rem; text-align: left; border-bottom: 1px solid #30363d; }
    td { padding: 0.5rem; border-bottom: 1px solid #21262d; }
  </style>
</head>
<body>
  <h1>🤖 Trading Bot</h1>

  <div hx-get="/partials/status"
       hx-trigger="load, every 15s"
       hx-swap="innerHTML"
       style="margin-bottom:1.5rem;font-size:0.95rem">
    <span style="color:#8b949e">Verbindung wird geprüft&#8230;</span>
  </div>

  <h2>Portfolio</h2>
  <div class="card"
       hx-get="/partials/portfolio"
       hx-trigger="load, every 10s"
       hx-swap="innerHTML">
    <span style="color:#8b949e">Lade…</span>
  </div>

  <h2>Letzte Trades</h2>
  <div class="card"
       hx-get="/partials/trades"
       hx-trigger="load, every 30s"
       hx-swap="innerHTML">
    <span style="color:#8b949e">Lade…</span>
  </div>

  <h2>Strategien</h2>
  <div class="card"
       hx-get="/partials/strategies"
       hx-trigger="load, every 30s"
       hx-swap="innerHTML">
    <span style="color:#8b949e">Lade&#8230;</span>
  </div>

  <h2>Equity-Kurve</h2>
  <div class="card">
    <canvas id="equity-chart" style="max-height:300px"></canvas>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4/dist/chart.umd.min.js"></script>
  <script>
    let equityChart = null;
    async function loadEquityChart() {
      const data = await fetch('/api/equity').then(r => r.json());
      if (equityChart) { equityChart.destroy(); equityChart = null; }
      if (!data.length) return;
      equityChart = new Chart(document.getElementById('equity-chart'), {
        type: 'line',
        data: {
          labels: data.map(d => d.timestamp.slice(0, 16)),
          datasets: [{
            label: 'Equity (USDT)',
            data: data.map(d => d.equity),
            borderColor: '#58a6ff',
            backgroundColor: 'rgba(88,166,255,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 2,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#e6edf3' } } },
          scales: {
            y: { ticks: { color: '#e6edf3' }, grid: { color: '#30363d' } },
            x: { ticks: { color: '#8b949e', maxTicksLimit: 8 }, grid: { color: '#30363d' } }
          }
        }
      });
    }
    loadEquityChart();
    setInterval(loadEquityChart, 60000);
  </script>
</body>
</html>
