# Bybit-Verbindung: true = Testnet (paper trading), false = Echtgeld
bybit_testnet: true

# Risikomanagement-Einstellungen
risk:
  # Maximaler Drawdown in % bevor alle neuen Trades gesperrt werden
  max_drawdown_pct: 20.0
  # Maximale Positionsgroesse pro Trade in % des Gesamtkapitals
  max_position_size_pct: 10.0
  # Maximale Anzahl gleichzeitig offener Positionen
  max_open_positions: 3
  # Tagesverlust-Limit in % -- bei Ueberschreitung wird der Bot pausiert
  daily_loss_limit_pct: 5.0
  # Hebel (Leverage) fuer alle Positionen
  leverage: 3

# Backtesting-Parameter (verwendet von /backtest Telegram-Command)
backtesting:
  # Bybit Maker-Fee (0.055%)
  fee_rate: 0.00055
  # Simulierter Slippage in %
  slippage_pct: 0.05
  # Startkapital fuer Backtests in USDT
  initial_capital: 250.0

# Strategien -- enabled: false = deaktiviert, aendere auf true zum Aktivieren
strategies:
  # EMA-Crossover: Golden Cross (Long) / Death Cross (Short)
  - name: ema_cross
    enabled: false
    symbols: ["BTCUSDT"]
    interval: "5"
    params:
      fast_ema: 9
      slow_ema: 21

  # Grid-Trading: Kaufen/Verkaufen an vordefinierten Preis-Levels
  - name: grid
    enabled: false
    symbols: ["ETHUSDT"]
    interval: "15"
    params:
      grid_count: 10
      grid_spacing_pct: 0.5

  # Bollinger-Band Mean-Reversion: Long unter Lower Band, Short ueber Upper Band
  - name: bb_reversion
    enabled: false
    symbols: ["BTCUSDT"]
    interval: "15"
    params:
      period: 20
      std_dev: 2.0

  # RSI-Strategie: Long bei Ueberverkauf, Close bei Ueberkauf
  - name: rsi
    enabled: false
    symbols: ["BTCUSDT"]
    interval: "15"
    params:
      period: 14
      oversold: 30.0
      overbought: 70.0
